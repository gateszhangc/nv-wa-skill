apiVersion: apps/v1
kind: Deployment
metadata:
  name: nv-wa-skill
  labels:
    app.kubernetes.io/name: nv-wa-skill
    app.kubernetes.io/part-of: nv-wa-skill
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nv-wa-skill
      app.kubernetes.io/part-of: nv-wa-skill
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nv-wa-skill
        app.kubernetes.io/part-of: nv-wa-skill
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - vmi3197690
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/nv-wa-skill:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            httpGet:
              path: /robots.txt
              port: http
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 20
            httpGet:
              path: /robots.txt
              port: http
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            httpGet:
              path: /robots.txt
              port: http
